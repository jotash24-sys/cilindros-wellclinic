<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Well Clinic — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--azul:#0F1F3A;--azul-soft:#1A2E52;--dourado:#A0896C;--dourado-light:#C4AD8F;--verde:#4A9E8E;--verde-light:#5CB8A6;--verde-bg:rgba(74,158,142,.08);--marfim:#FAF7F2;--marfim-warm:#F5F0E8;--grafite:#2D2D3A;--grafite-light:#5A5A6E;--terra:#B85C4A;--terra-bg:rgba(184,92,74,.08);--card:#FFF;--border:rgba(160,137,108,.2);--shadow-sm:0 2px 8px rgba(15,31,58,.06);--shadow-md:0 4px 20px rgba(15,31,58,.08);--radius:16px;--radius-sm:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Poppins',sans-serif;background:var(--marfim);color:var(--grafite);min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}
.dh{background:linear-gradient(135deg,var(--azul),var(--azul-soft));color:#fff;padding:28px 24px;text-align:center;position:relative;overflow:hidden}
.dh::before{content:'';position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:radial-gradient(circle,rgba(160,137,108,.1),transparent 70%);border-radius:50%}
.dh .logo{font-family:'Lora',serif;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--dourado-light);text-transform:uppercase;position:relative}
.dh h1{font-family:'Lora',serif;font-size:22px;font-weight:600;margin-top:4px;position:relative}
.dh .div{width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--dourado),transparent);margin:10px auto 8px}
.dh .upd{font-size:11px;opacity:.5;position:relative}
.bl{position:absolute;left:16px;top:24px;color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;font-weight:500}
.dc{max-width:900px;margin:0 auto;padding:24px 16px}
.ls{text-align:center;padding:80px 20px}.ls .sp{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--dourado);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}.ls p{font-size:14px;color:var(--grafite-light)}
.kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.kp{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px 16px;text-align:center;box-shadow:var(--shadow-sm);animation:fadeUp .5s ease-out both}
.kp .kv{font-family:'Lora',serif;font-size:32px;font-weight:700;color:var(--azul);line-height:1}
.kp .kl{font-size:11px;color:var(--grafite-light);margin-top:6px;font-weight:500}
.kp.alert .kv{color:var(--terra)}.kp.alert{border-color:rgba(184,92,74,.3);background:var(--terra-bg)}
.kp.success .kv{color:var(--verde)}
.sec{margin-bottom:24px;animation:fadeUp .5s ease-out both}.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:28px}
.sh .si{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sh h2{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--azul)}.sh p{font-size:11px;color:var(--grafite-light)}
.tc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm)}
.tc table{width:100%;border-collapse:collapse;font-size:13px}
.tc th{background:var(--marfim-warm);padding:12px 14px;text-align:left;font-weight:600;font-size:11px;color:var(--grafite-light);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.tc td{padding:12px 14px;border-bottom:1px solid rgba(160,137,108,.08)}.tc tr:last-child td{border-bottom:none}.tc tr:hover td{background:rgba(250,247,242,.5)}
.bd{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bd-ok{background:rgba(74,158,142,.1);color:var(--verde)}.bd-w{background:rgba(184,92,74,.1);color:var(--terra)}
.bc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow-sm)}
.br{display:flex;align-items:center;gap:12px;margin-bottom:10px}.br:last-child{margin-bottom:0}
.bl2{width:100px;font-size:12px;font-weight:500;text-align:right;flex-shrink:0}
.bt{flex:1;height:28px;background:var(--marfim-warm);border-radius:8px;overflow:hidden}
.bf{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:600;color:#fff;min-width:30px;transition:width .8s}
.bf.az{background:linear-gradient(90deg,var(--azul),var(--azul-soft))}.bf.vd{background:linear-gradient(90deg,var(--verde),var(--verde-light))}
.bf.dr{background:linear-gradient(90deg,#8B6914,var(--dourado))}.bf.tr{background:linear-gradient(90deg,var(--terra),#D4765E)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.g2{grid-template-columns:1fr}.kr{grid-template-columns:repeat(2,1fr)}}
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.ei{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:12px}
.ed{width:12px;height:12px;border-radius:50%;flex-shrink:0}.ed.ch{background:var(--verde);box-shadow:0 0 8px rgba(74,158,142,.3)}.ed.vz{background:var(--terra);box-shadow:0 0 8px rgba(184,92,74,.3)}
.en{font-size:14px;font-weight:600;color:var(--azul)}.edl{font-size:11px;color:var(--grafite-light)}
.pc{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow-sm)}
.pr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(160,137,108,.08)}.pr:last-child{border-bottom:none}
.pn{font-size:13px;font-weight:500}.pv{font-family:'Lora',serif;font-size:16px;font-weight:700;color:var(--azul)}.pv.in{font-size:12px;color:var(--grafite-light);font-family:'Poppins';font-weight:400}
.es{text-align:center;padding:40px 20px;color:var(--grafite-light);font-size:14px}.es .ic{font-size:36px;margin-bottom:12px}
.df{text-align:center;margin-top:40px;padding-bottom:32px}.df .dv{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--dourado),transparent);margin:0 auto 12px}
.df .bn{font-family:'Lora',serif;font-size:11px;font-weight:600;color:var(--dourado);letter-spacing:2px;text-transform:uppercase}.df .dv2{font-size:9px;color:rgba(45,45,58,.25);margin-top:8px}
.er{background:var(--terra-bg);border:1px solid rgba(184,92,74,.2);border-radius:var(--radius);padding:24px;text-align:center}.er h3{color:var(--terra);font-size:16px;margin-bottom:8px}.er p{font-size:13px;color:var(--grafite-light);line-height:1.6}
</style>
</head>
<body>
<div class="dh">
<a href="index.html" class="bl">← Registro</a>
<div class="logo">Well Clinic</div><h1>Dashboard de Gases Medicinais</h1><div class="div"></div>
<div class="upd" id="updAt">Carregando dados...</div>
</div>
<div class="dc" id="dc"><div class="ls" id="ls"><div class="sp"></div><p>Consultando dados da planilha...</p></div></div>

<script>
const API='https://script.google.com/macros/s/AKfycbyJqDDH8h5gaybLSk1v11-JOYL-FMvHot1BI9fq1mo5JBMWGyY4E6pG3J7ydN9SWMDUiA/exec';

// Verificar se o usuário é gestor
async function checkAccess(){
  const sess=localStorage.getItem('wc_session');
  if(!sess){window.location.href='operador.html';return false;}
  try{
    const parsed=JSON.parse(sess);
    if(parsed.perfil!=='gestor'){
      document.getElementById('dc').innerHTML='<div class="er"><h3>Acesso Restrito</h3><p>O dashboard é exclusivo para gestores.<br><a href="operador.html" style="color:#4A9E8E;">Voltar ao sistema</a></p></div>';
      return false;
    }
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({tipo_registro:'validar_sessao',session_token:parsed.token})});
    const result=await r.json();
    if(result.status!=='ok'){sessionStorage.removeItem('wc_session');window.location.href='operador.html';return false;}
    return true;
  }catch(e){window.location.href='operador.html';return false;}
}

async function load(){
  const ok=await checkAccess();
  if(!ok)return;
  try{const r=await fetch(API+'?action=dashboard');render(await r.json());}catch(e){document.getElementById('dc').innerHTML=`<div class="er"><h3>Erro ao carregar</h3><p>Verifique se o Apps Script foi atualizado e reimplantado.<br>${e.message}</p></div>`;}
}

function render(D){
document.getElementById('updAt').textContent='Atualizado: '+D.geradoEm;
const v=D.valvulas,m=D.movimentacoes,e=D.estoque,c=D.custos||{totalNFs:0,custoTotal:0,custoPorGas:{},nfs:[]};
const ch=e.filter(x=>x.status==='Cheio').length,vz=e.filter(x=>x.status!=='Cheio').length,al=v.diasSemFechamento?v.diasSemFechamento.length:0;
let h='';

// KPIs
h+='<div class="kr">';
h+=kpi(m.total,'Movimentações','');h+=kpi(ch,'Cheios','success');h+=kpi(vz,'Vazios',vz>0?'alert':'');
h+=kpi(al,'Sem Fechamento',al>0?'alert':'success');h+=kpi(c.totalNFs,'Notas Fiscais','');
h+=kpi('R$'+c.custoTotal.toFixed(0),'Custo Total','');
h+='</div>';

// Estoque
h+=sec('📊','Status dos Cilindros','Visão em tempo real','#E4F3ED');
h+='<div class="eg">';e.forEach(x=>{const s=x.status==='Cheio'?'ch':'vz';h+=`<div class="ei"><div class="ed ${s}"></div><div><div class="en">${x.id}</div><div class="edl">${x.tipo} · ${x.capacidade} · ${x.local}</div><div class="edl"><span class="bd bd-${s==='ch'?'ok':'w'}">${x.status}</span></div></div></div>`;});
h+='</div>';

// Válvulas
h+=sec('🔒','Controle de Válvulas','Abertura e fechamento diário','#FAF0E6');
if(al>0)h+=`<div style="background:var(--terra-bg);border:1px solid rgba(184,92,74,.2);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;"><span style="font-size:24px;">⚠️</span><div><div style="font-weight:600;color:var(--terra);font-size:14px;">${al} dia${al>1?'s':''} sem fechamento</div><div style="font-size:12px;color:var(--grafite-light);">${v.diasSemFechamento.join(', ')}</div></div></div>`;
if(v.resumoDiario&&v.resumoDiario.length>0){h+='<div class="tc"><table><tr><th>Data</th><th>Abriu</th><th>Fechou</th><th>Status</th></tr>';v.resumoDiario.slice(0,15).forEach(d=>{const s=d.abertura&&d.fechamento?'<span class="bd bd-ok">✅ Completo</span>':'<span class="bd bd-w">⚠️ Incompleto</span>';h+=`<tr><td style="font-weight:600;">${d.data}</td><td>${d.abertura||'—'}</td><td>${d.fechamento||'—'}</td><td>${s}</td></tr>`;});h+='</table></div>';}else h+=empty('Nenhum registro de válvulas');

// Movimentações
h+=sec('🔄','Movimentações','Frequência, consumo e previsão','#E4F3ED');
if(m.total>0){
h+='<div class="g2">';
h+='<div class="bc"><div style="font-weight:600;font-size:13px;margin-bottom:14px;color:var(--azul);">Por Tipo de Gás</div>';
const mg=Math.max(...Object.values(m.porGas));
Object.entries(m.porGas).forEach(([g,n])=>{h+=bar(g,n,mg,g.includes('Nitroso')?'az':'vd');});h+='</div>';
h+='<div class="bc"><div style="font-weight:600;font-size:13px;margin-bottom:14px;color:var(--azul);">Por Localização</div>';
const ml=Math.max(...Object.values(m.porLocal));const lc=['vd','az','dr','tr'];let li=0;
Object.entries(m.porLocal).forEach(([l,n])=>{h+=bar(l,n,ml,lc[li++%4]);});h+='</div></div>';

h+='<div style="margin-top:16px;" class="bc"><div style="font-weight:600;font-size:13px;margin-bottom:14px;color:var(--azul);">Frequência por Cilindro</div>';
const mc=Math.max(...Object.values(m.porCilindro));
Object.entries(m.porCilindro).sort((a,b)=>b[1]-a[1]).forEach(([c,n])=>{h+=bar(c,n,mc,c.includes('Nitroso')?'az':'vd');});h+='</div>';

h+='<div style="margin-top:16px;" class="pc"><div style="font-weight:600;font-size:13px;margin-bottom:14px;color:var(--azul);">📅 Dias Médios entre Trocas</div>';
Object.entries(m.mediaEntreTrocas).sort().forEach(([c,d])=>{h+=`<div class="pr"><div class="pn">${c}</div><div class="pv ${d===null?'in':''}">${d!==null?d+' dias':'Dados insuficientes'}</div></div>`;});h+='</div>';

if(m.ultimosRegistros&&m.ultimosRegistros.length>0){h+='<div style="margin-top:16px;"><div style="font-weight:600;font-size:13px;margin-bottom:10px;color:var(--azul);">Últimas Movimentações</div><div class="tc"><table><tr><th>Data</th><th>Operador</th><th>Ação</th><th>Cilindro</th><th>Local</th></tr>';
m.ultimosRegistros.forEach(r=>{const o=r.acao&&r.acao.includes('Retirada');h+=`<tr><td style="font-size:12px;">${r.dataHora}</td><td>${r.operador}</td><td><span class="bd ${o?'bd-w':'bd-ok'}">${o?'🔴':'🟢'} ${r.acao}</span></td><td style="font-weight:600;">${r.cilindro}</td><td>${r.local}</td></tr>`;});
h+='</table></div></div>';}
}else h+=empty('Nenhuma movimentação registrada');

// CUSTOS
h+=sec('💰','Controle de Custos','Custo por unidade e histórico de NFs','#FAF0E6');
if(c.totalNFs>0){
h+='<div class="g2">';
h+='<div class="pc"><div style="font-weight:600;font-size:13px;margin-bottom:14px;color:var(--azul);">Custo por Unidade de Gás</div>';
Object.entries(c.custoPorGas).forEach(([g,v])=>{h+=`<div class="pr"><div class="pn">${g}</div><div class="pv">R$ ${v.toFixed(2)}</div></div>`;});h+='</div>';
h+='<div class="pc"><div style="font-weight:600;font-size:13px;margin-bottom:14px;color:var(--azul);">Resumo Financeiro</div>';
h+=`<div class="pr"><div class="pn">Total NFs</div><div class="pv">${c.totalNFs}</div></div>`;
h+=`<div class="pr"><div class="pn">Custo Total</div><div class="pv">R$ ${c.custoTotal.toFixed(2)}</div></div>`;
h+='</div></div>';

if(c.nfs&&c.nfs.length>0){h+='<div style="margin-top:16px;"><div class="tc"><table><tr><th>NF</th><th>Fornecedor</th><th>Itens</th><th>Total</th></tr>';
c.nfs.forEach(n=>{h+=`<tr><td style="font-weight:600;">${n.numero}</td><td>${n.fornecedor}</td><td>${n.itens}</td><td style="font-weight:600;">R$ ${n.total.toFixed(2)}</td></tr>`;});
h+='</table></div></div>';}
}else h+=empty('Nenhuma NF registrada. Use o sistema para vincular notas fiscais.');

h+='<div class="df"><div class="dv"></div><div class="bn">Well Clinic</div><div class="dv2">Desenvolvido por Jonatã Schneider</div></div>';
document.getElementById('dc').innerHTML=h;
}

function kpi(v,l,c){return`<div class="kp ${c}"><div class="kv">${v}</div><div class="kl">${l}</div></div>`;}
function sec(i,t,s,bg){return`<div class="sec"><div class="sh"><div class="si" style="background:${bg}">${i}</div><div><h2>${t}</h2><p>${s}</p></div></div></div>`;}
function bar(l,n,mx,c){const p=Math.max(15,(n/mx)*100);return`<div class="br"><div class="bl2">${l}</div><div class="bt"><div class="bf ${c}" style="width:${p}%">${n}</div></div></div>`;}
function empty(m){return`<div class="es"><div class="ic">📭</div><p>${m}</p></div>`;}
load();
</script>
</body>
</html>
