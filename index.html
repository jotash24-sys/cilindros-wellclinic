<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Well Clinic — Redirecionando...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    background: #0F1F3A;
    color: #FAF7F2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
  }
  .container { max-width: 400px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(250,247,242,0.15);
    border-top-color: #4A9E8E;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 1.1rem; margin-bottom: 8px; }
  p { font-size: 0.85rem; opacity: 0.6; }
  a { color: #4A9E8E; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <h2>Redirecionando...</h2>
  <p id="msg">Levando você ao Portal Well Clinic</p>
  <p style="margin-top: 16px; font-size: 0.75rem;">
    Se não redirecionar, <a id="manualLink" href="#">clique aqui</a>.
  </p>
</div>

<script>
  // ============================================
  // REDIRECT INTELIGENTE
  // ============================================
  // URL do novo portal unificado
  const PORTAL_URL = 'https://jotash24-sys.github.io/wellclinic-portal/';

  // URL da página de operador de gases (dentro do mesmo repo, renomeada)
  const GASES_OPERADOR = 'operador.html';

  // Detectar parâmetros de QR Code
  // Se a URL tem parâmetros (ex: ?cilindro=CL-001), é um scan de QR Code
  // Nesse caso, redirecionar para a página de gases com os mesmos parâmetros
  const params = window.location.search;
  const hash = window.location.hash;

  if (params || hash) {
    // É um QR Code scan — manter no sistema de gases
    document.getElementById('msg').textContent = 'Abrindo controle de gases...';
    document.getElementById('manualLink').href = GASES_OPERADOR + params + hash;
    setTimeout(() => {
      window.location.href = GASES_OPERADOR + params + hash;
    }, 800);
  } else {
    // Acesso direto (sem parâmetros) — ir para o portal
    document.getElementById('msg').textContent = 'Levando você ao Portal Well Clinic';
    document.getElementById('manualLink').href = PORTAL_URL;
    setTimeout(() => {
      window.location.href = PORTAL_URL;
    }, 1200);
  }
</script>
</body>
</html>
